</head>
<body class="bg-[#0B0F19] text-[#E2E8F0] min-h-screen">

    <div class="max-w-5xl mx-auto px-4 py-10">
        <header class="mb-10 flex items-center justify-between border-b border-slate-800/80 pb-6">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600/10 p-2 rounded-xl border border-indigo-500/20">
                    <i class="fa-solid fa-layer-group text-indigo-400 text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-white">Prompt & Referência</h1>
                    <p class="text-slate-400 text-xs mt-0.5">Repositório interno de inteligência artificial.</p>
                </div>
            </div>
            <div>
                <button id="btn-toggle-form" class="bg-[#00C9A7] hover:bg-[#00B394] text-[#0B0F19] px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-lg shadow-[#00C9A7]/10 flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> Novo
                </button>
            </div>
        </header>

        <section id="form-container" class="hidden bg-[#161D30] border border-slate-800 rounded-2xl p-6 shadow-2xl mb-12">
            <h2 id="form-title" class="text-base font-semibold text-white mb-5 flex items-center gap-2">
                <i class="fa-solid fa-circle-plus text-indigo-400"></i> <span id="form-title-text">Novo Registro</span>
            </h2>
            
            <form id="prompt-form" class="space-y-5">
                <input type="hidden" id="entry-id">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="flex flex-col gap-1.5">
                        <label for="title" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Título do Prompt</label>
                        <input type="text" id="title" required placeholder="Ex: Capa Azul Premium - Caixas" 
                            class="w-full bg-[#1F2942] border border-slate-700/80 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 text-sm transition-colors">
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Imagem de Referência (Upload Local)</label>
                        <div class="flex items-center gap-3">
                            <label for="image-file" class="cursor-pointer bg-[#1F2942] hover:bg-[#283554] border border-slate-700/80 text-slate-300 px-4 py-3 rounded-xl text-sm font-medium transition-colors flex items-center gap-2 flex-1 justify-center md:justify-start">
                                <i class="fa-solid fa-cloud-arrow-up text-[#00C9A7]"></i>
                                <span id="file-label-text" class="truncate max-w-[200px]">Selecionar imagem...</span>
                            </label>
                            <input type="file" id="image-file" accept="image/*" class="hidden">
                            
                            <div id="image-preview-container" class="hidden w-12 h-12 rounded-xl border border-slate-700 overflow-hidden shrink-0 bg-slate-900">
                                <img id="image-preview" src="" class="w-full h-full object-cover">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label for="prompt-text" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Prompt Comando</label>
                    <textarea id="prompt-text" required rows="4" placeholder="Cole aqui o comando completo que será copiado pela equipe..." 
                        class="w-full bg-[#1F2942] border border-slate-700/80 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 text-sm transition-colors resize-none font-mono"></textarea>
                </div>

                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" id="btn-cancel" class="bg-slate-700 hover:bg-slate-600 text-white px-5 py-2.5 rounded-xl text-sm font-medium transition-colors">
                        Cancelar
                    </button>
                    <button type="submit" id="btn-submit" class="bg-[#00C9A7] hover:bg-[#00B394] text-[#0B0F19] px-6 py-2.5 rounded-xl text-sm font-bold transition-all shadow-md flex items-center gap-2">
                        <i class="fa-solid fa-check"></i> Salvar
                    </button>
                </div>
            </form>
        </section>

        <main>
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div class="relative w-full md:w-96">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500">
                        <i class="fa-solid fa-magnifying-glass text-sm"></i>
                    </span>
                    <input type="text" id="search-input" placeholder="Pesquisar prompts por título..." 
                        class="w-full bg-[#161D30] border border-slate-800 rounded-xl pl-10 pr-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 text-sm transition-colors">
                </div>

                <div class="flex items-center justify-between md:justify-end gap-3">
                    <span id="counter" class="text-xs font-semibold bg-slate-800/80 text-slate-400 px-3 py-1.5 rounded-lg border border-slate-700/50">0 prompts</span>
                </div>
            </div>
            
            <div id="gallery-grid" class="space-y-4">
                <div id="empty-state" class="text-center py-20 border border-dashed border-slate-800 rounded-2xl bg-[#161D30]">
                    <i class="fa-solid fa-folder-open text-slate-700 text-4xl mb-3"></i>
                    <p class="text-slate-500 text-sm">Nenhum prompt localizado na galeria.</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc 
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ===================================================
        // SUA CONFIGURAÇÃO DO FIREBASE (PERMANECE MANTIDA)
        // ===================================================
        const firebaseConfig = {
            apiKey: "AIzaSyB2r45MjuRd1pI2FaYZu9k5uVN2JO4eyyI",
            authDomain: "pasta-prompts.firebaseapp.com",
            projectId: "pasta-prompts",
            storageBucket: "pasta-prompts.firebasestorage.app",
            messagingSenderId: "690573876670",
            appId: "1:690573876670:web:2233804e9e29f037686def"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const collectionRef = collection(db, "prompts");

        // Elementos DOM
        const btnToggleForm = document.getElementById('btn-toggle-form');
        const formContainer = document.getElementById('form-container');
        const promptForm = document.getElementById('prompt-form');
        const entryIdInput = document.getElementById('entry-id');
        const titleInput = document.getElementById('title');
        const imageFileInput = document.getElementById('image-file');
        const fileLabelText = document.getElementById('file-label-text');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const promptTextInput = document.getElementById('prompt-text');
        const galleryGrid = document.getElementById('gallery-grid');
        const emptyState = document.getElementById('empty-state');
        const counterSpan = document.getElementById('counter');
        const searchInput = document.getElementById('search-input');
        
        const formTitleText = document.getElementById('form-title-text');
        const btnSubmit = document.getElementById('btn-submit');
        const btnCancel = document.getElementById('btn-cancel');

        let currentBase64Image = "";
        let localPromptsArray = [];
        const fallbackImage = 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=256&auto=format&fit=crop';

        // Controle do Abre/Fecha do Painel
        btnToggleForm.addEventListener('click', () => {
            if (formContainer.classList.contains('hidden')) {
                openFormLayout();
            } else {
                resetForm();
            }
        });

        function openFormLayout() {
            formContainer.classList.remove('hidden');
            btnToggleForm.innerHTML = `<i class="fa-solid fa-xmark"></i> Fechar`;
            btnToggleForm.className = "bg-slate-700 hover:bg-slate-600 text-white px-5 py-2.5 rounded-xl text-sm font-medium transition-all shadow-sm flex items-center gap-2";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Lógica de Conversão Base64 Segura (file:///)
        imageFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            fileLabelText.innerText = file.name;

            const reader = new FileReader();
            reader.onload = function(event) {
                currentBase64Image = event.target.result;
                imagePreview.src = currentBase64Image;
                imagePreviewContainer.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        });

        // Salvar ou Editar no Firestore
        promptForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = entryIdInput.value;
            
            const data = {
                title: titleInput.value.trim(),
                prompt: promptTextInput.value.trim(),
                imageUrl: currentBase64Image || fallbackImage,
                updatedAt: new Date()
            };

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Gravando...`;

            try {
                if (id) {
                    await updateDoc(doc(db, "prompts", id), data);
                } else {
                    data.createdAt = new Date();
                    await addDoc(collectionRef, data);
                }
                resetForm();
            } catch (error) {
                console.error(error);
                alert("Erro ao gravar dados. Certifique-se de que a imagem não seja pesada demais.");
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = `<i class="fa-solid fa-check"></i> Salvar`;
            }
        });

        // Escuta Realtime
        const q = query(collectionRef, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            localPromptsArray = [];
            snapshot.forEach((doc) => {
                localPromptsArray.push({ id: doc.id, ...doc.data() });
            });
            renderGallery(localPromptsArray);
        });

        // Renderização Estilizada dos Cards Escuros
        function renderGallery(prompts) {
            galleryGrid.innerHTML = "";
            
            if (prompts.length === 0) {
                galleryGrid.appendChild(emptyState);
                counterSpan.innerText = "0 prompts";
                return;
            }

            counterSpan.innerText = `${prompts.length} ${prompts.length === 1 ? 'prompt' : 'prompts'}`;

            prompts.forEach((item) => {
                const card = document.createElement('div');
                card.className = "bg-[#161D30] border border-slate-800/60 rounded-xl overflow-hidden shadow-md flex flex-col md:flex-row transition-all hover:border-slate-700";
                
                const safePrompt = item.prompt.replace(/`/g, '\\`').replace(/\$/g, '\\$');
                const safeTitle = item.title.replace(/"/g, '&quot;');

                card.innerHTML = `
                    <div class="w-full md:w-44 h-36 md:h-auto bg-slate-900 shrink-0 relative overflow-hidden group border-b md:border-b-0 md:border-r border-slate-800/80">
                        <img src="${item.imageUrl}" alt="${safeTitle}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" onerror="this.src='${fallbackImage}'">
                    </div>
                    <div class="p-5 flex-1 flex flex-col justify-between">
                        <div>
                            <div class="flex items-start justify-between gap-4 mb-3">
                                <h3 class="font-semibold text-white text-base tracking-wide leading-snug">${item.title}</h3>
                                <div class="flex items-center gap-1 shrink-0">
                                    <button onclick="copyPrompt(this, \`${safePrompt}\`)" title="Copiar Comando" class="text-slate-400 hover:text-[#00C9A7] p-2 rounded-lg hover:bg-slate-800 transition-colors">
                                        <i class="fa-regular fa-copy text-sm"></i> Copiar
                                    </button>
                                    <button onclick="editEntry('${item.id}', \`${safeTitle}\`, \`${safePrompt}\`, \`${item.imageUrl}\`)" title="Editar" class="text-slate-400 hover:text-amber-400 p-2 rounded-lg hover:bg-slate-800 transition-colors">
                                        <i class="fa-regular fa-pen-to-square text-sm"></i> Editar
                                    </button>
                                    <button onclick="deleteEntry('${item.id}')" title="Excluir" class="text-slate-400 hover:text-red-400 p-2 rounded-lg hover:bg-slate-800 transition-colors">
                                        <i class="fa-regular fa-trash-can text-sm"></i> Excluir
                                    </button>
                                </div>
                            </div>
                            <p class="text-slate-300 text-xs whitespace-pre-wrap font-mono bg-[#1F2942]/60 border border-slate-800 p-3 rounded-lg max-h-24 overflow-y-auto select-all">${item.prompt}</p>
                        </div>
                    </div>
                `;
                galleryGrid.appendChild(card);
            });
        }

        // Filtro Instantâneo
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().trim();
            const filtered = localPromptsArray.filter(item => item.title.toLowerCase().includes(searchTerm));
            renderGallery(filtered);
        });

        // Funções de Interface vinculadas ao Window
        window.copyPrompt = (button, text) => {
            navigator.clipboard.writeText(text).then(() => {
                const originalContent = button.innerHTML;
                button.innerHTML = `<i class="fa-solid fa-check text-[#00C9A7]"></i> Copiado!`;
                button.classList.add('bg-slate-800');
                setTimeout(() => {
                    button.innerHTML = originalContent;
                    button.classList.remove('bg-slate-800');
                }, 2000);
            }).catch(err => console.error(err));
        };

        window.editEntry = (id, title, prompt, imageUrl) => {
            entryIdInput.value = id;
            titleInput.value = title;
            promptTextInput.value = prompt;
            
            currentBase64Image = imageUrl;
            if (imageUrl && imageUrl !== fallbackImage) {
                imagePreview.src = imageUrl;
                imagePreviewContainer.classList.remove('hidden');
                fileLabelText.innerText = "Alterar imagem...";
            } else {
                imagePreviewContainer.classList.add('hidden');
                fileLabelText.innerText = "Selecionar imagem...";
            }

            formTitleText.innerText = "Editar Registro";
            btnSubmit.innerHTML = `<i class="fa-solid fa-check"></i> Atualizar`;
            openFormLayout();
        };

        window.deleteEntry = async (id) => {
            if (!confirm("Remover este prompt da base de dados?")) return;
            try {
                await deleteDoc(doc(db, "prompts", id));
            } catch (error) {
                console.error(error);
            }
        };

        function resetForm() {
            promptForm.reset();
            entryIdInput.value = "";
            currentBase64Image = "";
            fileLabelText.innerText = "Selecionar imagem...";
            imagePreviewContainer.classList.add('hidden');
            imagePreview.src = "";
            
            formTitleText.innerText = "Novo Registro";
            btnSubmit.innerHTML = `<i class="fa-solid fa-check"></i> Salvar`;
            
            formContainer.classList.add('hidden');
            btnToggleForm.innerHTML = `<i class="fa-solid fa-plus"></i> Novo`;
            btnToggleForm.className = "bg-[#00C9A7] hover:bg-[#00B394] text-[#0B0F19] px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-lg flex items-center gap-2";
        }

        btnCancel.addEventListener('click', resetForm);
    </script>
</body>
</html>
